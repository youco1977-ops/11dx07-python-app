<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "支援記録システム" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='images/apple-touch-icon.png') }}" alt="支援記録システム アイコン" class="brand-icon">
        <span>支援記録システム</span>
      </a>

      <nav class="nav">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
        <a href="/dashboard" class="{% if request.path.startswith('/dashboard') %}active{% endif %}">Dashboard</a>
        <a href="/clients" class="{% if request.path.startswith('/clients') %}active{% endif %}">利用者一覧</a>
      </nav>
    </div>
  </div>

  <div class="container">
    <div class="card">
      {% block content %}{% endblock %}
    </div>

    <div class="hero-brand">
      <img src="{{ url_for('static', filename='images/job-logo.png') }}" alt="ジョブリッジ ロゴ" class="hero-logo">
    </div>
  </div>
</body>
</html>
