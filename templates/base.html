<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "支援記録システム" }}</title>

  <style>
    :root{
  --bg:#eef2ff;        /* 背景を少し濃く */
  --card:#ffffff;
  --text:#0b1220;
  --muted:#475569;
  --line:#cbd5e1;      /* 線を濃く */
  --accent:#1d4ed8;    /* 青を濃く */
  --accent2:#1e40af;
  --shadow: 0 10px 28px rgba(2,6,23,.16); /* 影を強め */
  --radius: 14px;
}
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      color:var(--text);
      background:var(--bg);
    }
    a{ color:var(--accent); text-decoration:none; }
    a:hover{ text-decoration:underline; }

    /* layout */
    .topbar{
      position: sticky; top: 0; z-index: 10;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      max-width: 980px;
      margin: 0 auto;
      padding: 12px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
    }
    .brand{
      display:flex; align-items:center; gap:10px;
      font-weight:800;
      letter-spacing:.02em;
    }
    .brand-badge{
      width:34px;height:34px;border-radius:10px;
      background: linear-gradient(135deg, var(--accent), #22c55e);
      box-shadow: 0 10px 18px rgba(37,99,235,.25);
    }
    .nav{
      display:flex; align-items:center; gap:10px;
      flex-wrap:wrap;
    }
    .nav a{
    padding:8px 12px;
    border-radius: 12px;
    border:1px solid transparent;
    }
    .nav a.active{
    background:#dbeafe;
    border:1px solid #93c5fd;
    box-shadow: 0 6px 14px rgba(2,6,23,.10);
    }
    
    .nav a:hover{
      background:#eef2ff;
      text-decoration:none;
    }

    .container { padding: 16px; max-width: 980px; margin: 18px auto; }
    .card { line-height: 1.7; }
    p, li { color: var(--text); }

    /* card */
    .card{
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .title{
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: .01em;
    }
    .sub{
      margin: 0 0 16px;
      color: var(--muted);
    }

    /* lists */
    ul{ margin: 10px 0; padding-left: 18px; }
    li{ margin: 6px 0; }

    /* buttons / inputs */
    .btn{
      display:inline-block;
      padding: 10px 14px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      border: 0;
      cursor: pointer;
    }
    .btn:hover{ background: var(--accent2); text-decoration:none; }
    .btn-ghost{
      display:inline-block;
      padding: 10px 14px;
      border-radius: 12px;
      background: #f3f4f6;
      color: var(--text);
      border: 1px solid var(--line);
    }

    label{ display:block; font-weight:700; margin: 10px 0 6px; }
    input[type="text"], input[type="number"], select, textarea{
      width: 280px;
      max-width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      outline: none;
    }
    input:focus, select:focus, textarea:focus{
      border-color: rgba(37,99,235,.55);
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    /* dashboard stats */
    .stats{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 14px 0 6px;
    }
    .stat{
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fbfdff;
    }
    .stat .k{ color: var(--muted); font-size: 12px; }
    .stat .v{ font-size: 22px; font-weight: 800; margin-top: 4px; }

    @media (max-width: 720px){
      .stats{ grid-template-columns: 1fr; }
    }
    h2{ margin-top:18px; font-size:18px; }

    .section{
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #ffffff;
  padding: 14px;
  margin-top: 14px;
}

.section-title{
  margin: 0 0 10px;
  font-size: 16px;
  color: var(--text);
}

.list-clean{
  list-style: none;
  padding-left: 0;
  margin: 0;
}

.list-clean li{
  padding: 10px 8px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.list-clean li:first-child{
  border-top: none;
}

.badge-warn{
  font-weight: 800;
  padding: 2px 8px;
  border-radius: 999px;
  border: 1px solid #fecaca;
  background: #fef2f2;
  color: #b91c1c;
}
.cards{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
  margin-top: 12px;
}

.card-item{
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  padding: 14px;
  text-decoration: none;
  color: var(--text);
  box-shadow: 0 6px 18px rgba(2,6,23,.06);
}

.card-item:hover{
  box-shadow: 0 10px 26px rgba(2,6,23,.10);
  transform: translateY(-1px);
}

.card-title{
  font-weight: 800;
  margin: 0 0 6px;
}

.card-sub{
  margin: 0;
  color: var(--muted);
  font-size: 14px;
}

.card-item:hover .chev{
  filter: brightness(0.95);
}

  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-badge"></span>
        <span>支援記録システム</span>
      </div>

     <nav class="nav">
  <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
  <a href="/dashboard" class="{% if request.path.startswith('/dashboard') %}active{% endif %}">Dashboard</a>
  <a href="/clients" class="{% if request.path.startswith('/clients') %}active{% endif %}">利用者一覧</a>
</nav>
    </div>
  </div>

  <div class="container">
    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
