{% extends "base.html" %}
{% block content %}
<h1>利用者一覧</h1>

<div class="cards">
  {% for c in clients %}
    <a class="card-item" href="/clients/{{ c.id }}">
  <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
    <div>
      <p class="card-title">{{ c.name }}</p>
      <p class="card-sub">種別：{{ c.type }}</p>
    </div>

  </div>
</a>
  {% endfor %}
</div>

{% endblock %}
